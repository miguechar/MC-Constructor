name: Build

on:
  push:
    branches:
      - dev
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build MCConstructor
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: msbuild MCConstructor.sln /t:Restore /p:RestorePackagesConfig=true /verbosity:minimal

      - name: Build solution
        run: msbuild MCConstructor.sln /m /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: MCConstructor-Release
          path: MCConstructor/bin/Release/**
          if-no-files-found: error
