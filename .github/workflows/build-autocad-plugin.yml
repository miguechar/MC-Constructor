name: Build AutoCAD Plugin

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Match your project version

      - name: Restore dependencies
        run: dotnet restore MCConstructor/MCConstructor.csproj

      - name: Build project
        run: dotnet build MCConstructor/MCConstructor.csproj --configuration Release --no-restore

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoCAD-Plugin-DLL
          path: |
            **/bin/Release/*.dll
  release:
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'release'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: AutoCAD-Plugin-DLL

      - name: Upload files to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.dll
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
